<footer class="footer site-footer">
    <div class="footer_social-icons site-footer__icons">
        {{- partial "socialIcons.html" site.Params.socialIcons -}}
    </div>
    <small class="footer_copyright site-footer__meta">
        &copy; {{ now.Format "2006" }} {{ .Site.Params.author.name }}
        <span class="site-footer__sep">&middot;</span>
        Built with <a href="https://gohugo.io" target="_blank" rel="noopener">Hugo</a>
        and <a href="https://github.com/hugo-sid/hugo-blog-awesome" target="_blank" rel="noopener">hugo-blog-awesome</a>
    </small>
</footer>

{{- if .Site.Params.goToTop -}}
<a href="#" title="{{ T "footer.go_to_top" }}" id="totop">
    {{ partial "svgs/arrowUp.svg" (dict "height" 48 "width" 48) . }}
</a>
{{- end -}}
