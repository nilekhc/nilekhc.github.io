baseURL: "https://nilekhc.github.io/"
locale: en-us
title: "Nilekh Chaudhari"
theme: hugo-blog-awesome

enableRobotsTXT: true
enableGitInfo: false
buildDrafts: false
buildFuture: false
enableEmoji: true

pagination:
  pagerSize: 10

markup:
  goldmark:
    renderer:
      unsafe: true                       # allow raw html (future visualizer embeds)
  tableOfContents:
    startLevel: 2
    endLevel: 3
    ordered: true                        # alisa uses ordered list for toc
  highlight:
    style: github-dark
    codeFences: true
    guessSyntax: true

params:
  sitename: "Nilekh Chaudhari"
  description: "Nilekh Chaudhari's blog. Notes on LLM inference, Kubernetes, and systems engineering."
  defaultColor: dark
  showToc: true
  showTags: false
  showReadingTime: false
  showAuthor: false
  showShare: false
  showRSSButton: true
  author:
    name: "Nilekh Chaudhari"
    intro: ""
  socialIcons:
    - name: github
      url: https://github.com/nilekhc
      title: nilekhc
    - name: linkedin
      url: https://linkedin.com/in/nilekhchaudhari
      title: nilekhchaudhari
    - name: x
      url: https://x.com/nilekhchaudhari
      title: nilekhchaudhari
    - name: slack
      url: https://slack.k8s.io/
      title: Kubernetes Slack · Nilekh

menu:
  main:
    - name: blog
      url: /post/
      weight: 1
    - name: about
      url: /about/
      weight: 2
