name: deploy hugo site to pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # daily rebuild at 08:03 UTC so future-dated posts publish on their date.
  # hugo's buildFuture is false, so posts with a date in the future are
  # skipped at build time; this cron re-runs the build every day so a post
  # dated tomorrow gets included the next morning without a manual push.
  # off-minute (03) to dodge github actions cron congestion at :00.
  schedule:
    - cron: '3 8 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.164.0
    steps:
      - name: install hugo
        run: |
          curl -LO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/configure-pages@v6
        id: pages
      - name: build
        env:
          HUGO_ENVIRONMENT: production
        run: hugo build --gc --minify --baseURL "${{ steps.pages.outputs.base_url }}/"
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
